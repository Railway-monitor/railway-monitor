<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAIL-WATCHER 实时追踪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-xl mx-auto space-y-6">
        <header class="flex justify-between items-center">
            <h1 class="text-2xl font-black text-emerald-400 tracking-tighter">RAIL-WATCHER</h1>
            <span class="text-xs bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full animate-pulse">● 实时链路已连接</span>
        </header>

        <div class="glass rounded-3xl p-6 shadow-2xl">
            <label class="block text-sm text-slate-400 mb-2 ml-1">选择出发站</label>
            <div class="relative">
                <input type="text" id="station-search" 
                       oninput="searchStation()"
                       placeholder="输入拼音或汉字 (如: bjn)" 
                       class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                
                <div id="results" class="absolute w-full mt-2 bg-slate-800 rounded-2xl shadow-2xl overflow-hidden hidden z-50 border border-slate-700">
                </div>
            </div>
        </div>

        <div id="selection-card" class="hidden glass rounded-3xl p-8 text-center animate-in fade-in duration-500">
            <div class="text-slate-400 text-sm mb-2">当前选择车站</div>
            <div id="selected-name" class="text-5xl font-black text-white mb-4">---</div>
            <div id="selected-code" class="inline-block bg-emerald-500 text-slate-900 px-3 py-1 rounded-md font-mono font-bold">CODE</div>
        </div>
    </div>

    <script>
        const API_URL = "https://rail-api.l1quid.dpdns.org/"; 

        async function searchStation() {
            const query = document.getElementById('station-search').value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            
            if (query.length < 1) {
                resultsDiv.classList.add('hidden');
                return;
            }

            try {
                // 向你的云端大脑请求数据
                const response = await fetch(`${API_URL}/api/stations?q=${query}`);
                const stations = await response.json();

                if (stations.length > 0) {
                    resultsDiv.classList.remove('hidden');
                    resultsDiv.innerHTML = stations.map(s => `
                        <div onclick="selectStation('${s.n}', '${s.c}')" class="p-4 hover:bg-emerald-500 hover:text-slate-900 cursor-pointer border-b border-slate-700 last:border-0 transition-colors">
                            <span class="font-bold">${s.n}</span>
                            <span class="text-xs opacity-60 ml-2">${s.c}</span>
                        </div>
                    `).join('');
                } else {
                    resultsDiv.classList.add('hidden');
                }
            } catch (e) {
                console.error("搜索失败", e);
            }
        }

        function selectStation(name, code) {
            document.getElementById('results').classList.add('hidden');
            document.getElementById('selection-card').classList.remove('hidden');
            document.getElementById('selected-name').innerText = name;
            document.getElementById('selected-code').innerText = code;
            document.getElementById('station-search').value = name;
        }
    </script>
</body>
</html>
