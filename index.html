<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAIL-WATCHER 实时追踪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; font-family: system-ui, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        /* 修复重叠的关键：下拉框阴影和层级 */
        .search-results { z-index: 100; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-xl mx-auto space-y-6">
        <header class="flex justify-between items-center">
            <h1 class="text-2xl font-black text-emerald-400 tracking-tighter italic">RAIL-WATCHER</h1>
            <div class="flex items-center gap-2">
                <span id="net-status" class="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full">● 链路正常</span>
            </div>
        </header>

        <div class="glass rounded-3xl p-6 relative">
            <div class="flex gap-2 mb-4">
                <button class="flex-1 py-2 rounded-xl bg-emerald-500/10 text-emerald-400 text-xs font-bold border border-emerald-500/20">车次查询</button>
                <button class="flex-1 py-2 rounded-xl bg-slate-800 text-slate-500 text-xs font-bold">站站查询</button>
            </div>
            
            <div class="relative">
                <input type="text" id="main-search" oninput="searchStation()"
                       placeholder="输入车次或车站 (如 G102 / bjn)" 
                       class="w-full bg-slate-900/80 border border-slate-700 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-lg font-bold">
                
                <div id="results" class="search-results absolute w-full mt-1 bg-slate-800 rounded-2xl overflow-hidden hidden border border-slate-700"></div>
            </div>
        </div>

        <div id="display-card" class="hidden glass rounded-[2rem] p-8 text-center border-t border-white/10 shadow-2xl transition-all">
            <div id="card-content"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://train.l1quid.dpdns.org"; // 建议统一用你的自定义域名

        async function searchStation() {
            const query = document.getElementById('main-search').value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            if (query.length < 1) { resultsDiv.classList.add('hidden'); return; }

            try {
                const res = await fetch(`${API_URL}/api/stations?q=${query}`);
                const data = await res.json();
                if (data.length > 0) {
                    resultsDiv.classList.remove('hidden');
                    resultsDiv.innerHTML = data.map(s => `
                        <div onclick="selectItem('${s.n}', '${s.c}')" class="p-4 hover:bg-emerald-500 hover:text-slate-900 cursor-pointer border-b border-slate-700/50 last:border-0 flex justify-between">
                            <span class="font-bold">${s.n}</span>
                            <span class="font-mono text-xs opacity-50">${s.c}</span>
                        </div>
                    `).join('');
                } else { resultsDiv.classList.add('hidden'); }
            } catch (e) { console.error("API Error"); }
        }

        function selectItem(name, code) {
            document.getElementById('results').classList.add('hidden');
            const card = document.getElementById('display-card');
            card.classList.remove('hidden');
            
            // 这里预留了实时进度的 UI 结构
            document.getElementById('card-content').innerHTML = `
                <div class="text-slate-400 text-xs mb-2 uppercase tracking-widest">Live Tracking</div>
                <div class="text-6xl font-black text-white mb-6">${name}</div>
                
                <div class="relative h-1.5 bg-slate-800 rounded-full mb-8 overflow-hidden">
                    <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-emerald-600 to-emerald-400 rounded-full" style="width: 45%"></div>
                </div>
                
                <div class="flex justify-between items-center">
                    <span class="bg-emerald-500 text-slate-900 px-4 py-1 rounded-lg font-black text-sm">${code}</span>
                    <span class="text-emerald-400 text-xs font-mono">正点运行 ●</span>
                </div>
            `;
        }
    </script>
</body>
</html>
